{% extends 'base.html' %}

{% block title %}Supprimer le type de document{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-exclamation-triangle me-2"></i>Confirmer la suppression
                    </h4>
                </div>
                <div class="card-body text-center py-4">
                    <p class="fs-5">Voulez-vous vraiment supprimer le type :</p>
                    <p class="fw-bold fs-4 text-danger">« {{ object.nom }} »</p>
                    <p class="text-muted">Cette action est irréversible.</p>

                    <form method="post" class="d-inline">
                        {% csrf_token %}
                        <a href="{% url 'personnel:type_document_list' %}" class="btn btn-secondary me-2">
                            <i class="bi bi-x-circle me-1"></i>Annuler
                        </a>
                        <button type="submit" class="btn btn-danger fw-bold">
                            <i class="bi bi-trash me-1"></i>Supprimer définitivement
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
